<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Music System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <div class="auth-box">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <p>No account? <a href="register.html">Register</a></p>
    <p id="msg"></p>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      if (!email || !password) {
        document.getElementById('msg').textContent = 'Please fill in all fields'
        return
      }

      document.getElementById('msg').textContent = 'Logging in...'

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        document.getElementById('msg').textContent = error.message
      } else {
        const role = data.user.user_metadata.role
        window.location.href = role === 'artist' ? 'artist/dashboard.html' : 'listener/dashboard.html'
      }
    }

    document.getElementById('loginBtn').addEventListener('click', login)
  </script>
</body>
</html>
