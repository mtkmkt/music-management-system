<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — Music System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-box">
    <h1>Create Account</h1>

    <input type="text" id="fullname" placeholder="Full Name" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <div class="role-select">
      <label>
        <input type="radio" name="role" value="artist" /> Artist
      </label>
      <label>
        <input type="radio" name="role" value="listener" checked /> Listener
      </label>
    </div>

    <button id="registerBtn">Sign Up</button>
    <p>Already have an account? <a href="index.html">Login</a></p>
    <p id="msg"></p>
  </div>

<script type="module">
    import { supabase } from './js/supabase.js'

    async function register() {
      const full_name = document.getElementById('fullname').value
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const role = document.querySelector('input[name="role"]:checked').value

      const { error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name, role } }
      })

      if (error) {
        document.getElementById('msg').textContent = error.message
      } else {
        window.location.href = role === 'artist' ? 'artist/dashboard.html' : 'listener/dashboard.html'
      }
    }

    // ← this line connects the button to the function
    document.getElementById('registerBtn').addEventListener('click', register)
  </script>
</body>
</html>
